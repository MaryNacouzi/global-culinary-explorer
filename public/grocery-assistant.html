<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Global Culinary Explorer | Grocery Assistant</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/paragraph.css">
</head>
<body>

<header>
  <nav class="custom-sticky-nav sticky-top">
    <a href="index.html" class="brand">Global Culinary Explorer</a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="recipe-lab.html">Recipe Lab</a></li>
      <li><a href="grocery-assistant.html" class="active">Grocery Assistant</a></li>
      <li><a href="beirut-bites.html">Beirut Bites</a></li>
    </ul>
  </nav>
</header>

<main>
  <section class="card-cream" style="max-width:640px;margin:0 auto;">
    <h1 class="section-title">Grocery Assistant</h1>
    <p>Add items, check them off as you shop, and remove what you no longer need.</p>

    <form id="grocery-form" class="search-bar">
      <input type="text" id="item-name" class="form-control-custom" placeholder="Item name, e.g. Sumac" required />
      <input type="text" id="item-quantity" class="form-control-custom" style="max-width:120px;" placeholder="Qty" />
      <button type="submit" class="btn-mustard">Add</button>
    </form>

    <div id="grocery-status" aria-live="polite"></div>
    <div id="grocery-list"></div>
  </section>
</main>

<footer>
  <p>&copy; 2026 Global Culinary Explorer & Smart Grocery Assistant — Lebanese University, Faculty of Engineering</p>
</footer>

<script src="js/groceryListEngine.js"></script>
</body>
</html>
